# OSV-Scanner dependency-scan suppression baseline (the risk-acceptance log).
#
# OSV-Scanner has no CVSS threshold: the gate fails on ANY unsuppressed finding.
# To accept a finding below the team's risk bar, add an [[IgnoredVulns]] entry.
# Every entry MUST carry a `reason` and an `ignoreUntil` (expiry) so suppressions
# are justified and time-boxed, not permanent mutes. Per the
# `backend-security-scanning` "remediated, not renewed" requirement, a fixable
# finding is cleared by UPGRADING the dependency — never by extending an expiry on
# the same vulnerable version. An entry stays only for a finding with no fix in
# any release, or one fixed only outside the project's accepted version policy.
#
# BASELINE (CR-8 bump-spring-boot-security-patches, 2026-06-20): the original
# 52-entry CR-4 baseline (Spring Boot 3.4.2 BOM) was REMEDIATED here by bumping
# Spring Boot 3.4.2 → 3.5.15 (+ Spring Modulith 1.4.12, minio 8.6.0, and a
# bcprov 1.84 test pin). That cleared all 52 — every Critical/High incl. the
# Tomcat RCEs and the spring-boot self-CVEs. (Remediation record: this change's
# archived proposal/design + .flow-journal.md.)
#
# The 5 entries below are ALL bound to the SpotBugs Gradle plugin's own classpath
# (the `spotbugs` configuration — the SAST runner's transitive logging libs). They
# are NOT in the application/production runtime, the shipped artifact, or the test
# runtime; they ship to no one. They are all Medium severity. They are fixable only
# by upgrading the SpotBugs plugin (6.0.26) so its transitives move — out of scope
# for this dependency-security bump and tracked as a follow-up CR
# (`bump-spotbugs-plugin`). Short expiry (2026-09-20) forces that revisit.

[[IgnoredVulns]]
