ignoreUntil = 2026-09-20T00:00:00Z
reason = "org.apache.commons:commons-lang3@3.17.0 — present ONLY via the SpotBugs plugin's `spotbugs` tool classpath (SAST runner), not in app/production/test runtime or the shipped artifact. Medium (6.5). Fixed in 3.18.0 but only reachable by upgrading the SpotBugs plugin; tracked in follow-up CR bump-spotbugs-plugin. Sandbox-only."

